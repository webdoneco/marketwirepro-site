name: Auto News Fetcher

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and rewrite news
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push articles
        run: |
          git config user.name  "MarketWirePro Bot"
          git config user.email "bot@marketwirepro.com"
          git add api/articles.json
          git diff --staged --quiet || git commit -m "Auto: Update news articles $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
